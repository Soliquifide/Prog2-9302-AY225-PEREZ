<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prelim Grade Calculator</title>
    <link rel="stylesheet" href="style.css">
   
</head>
<body>
    <div class="container">
        <h1>Prelim Grade Calculator</h1>
        
        <div class="form-group">
            <label for="attendance">Number of Attendances:</label>
            <input type="number" id="attendance" step="0.01" placeholder="Enter attendance count">
        </div>
        
        <div class="form-group">
            <label for="lab1">Lab Work 1 Grade:</label>
            <input type="number" id="lab1" step="0.01" min="0" max="100" placeholder="Enter grade (0-100)" oninput="limitInput(this)">
        </div>
        
        <div class="form-group">
            <label for="lab2">Lab Work 2 Grade:</label>
            <input type="number" id="lab2" step="0.01" min="0" max="100" placeholder="Enter grade (0-100)" oninput="limitInput(this)">
        </div>
        
        <div class="form-group">
            <label for="lab3">Lab Work 3 Grade:</label>
            <input type="number" id="lab3" step="0.01" min="0" max="100" placeholder="Enter grade (0-100)" oninput="limitInput(this)">
        </div>
        
        <div class="button-group">
            <button class="btn-calculate" onclick="calculatePrelimGrade()">Calculate</button>
            <button class="btn-clear" onclick="clearForm()">Clear</button>
        </div>
        
        <div id="output"></div>
    </div>
    
    <script src="PrelimGradeCalculator.js"></script>
</body>
</html>
